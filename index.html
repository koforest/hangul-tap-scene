<!DOCTYPE html>
<html lang="ja">
<head>

      <ellipse cx="1080" cy="340" rx="46" ry="11" fill="#cba98e"/>

      <circle cx="1200" cy="300" r="34" fill="#a9bd97"/>

  </div>

  <header class="app-header">
    <h1 class="app-title">ハングルでタタッ！</h1>
    <button id="rate-toggle" class="rate-toggle" type="button" aria-label="読み上げ速度の切り替え">
      <img src="emoji/1f40c.svg" alt="" class="rate-icon">
      <span id="rate-label">ふつう</span>
    </button>
  </header>

  <main id="app">
    <nav class="scene-nav" aria-label="シーン選択">
      <select id="scene-select" class="scene-select" aria-label="シーンを選ぶ"></select>
      <button id="random-scene" class="random-scene" type="button">🎲 ランダム</button>
    </nav>

    <section class="scene-card">
      <h2 id="scene-title" class="scene-title"></h2>
      <p class="scene-hint">単語をタップして発音を聞こう</p>
      <div id="chunks" class="chunks"></div>

      <div id="result" class="result" hidden>
        <div id="stage" class="stage"></div>
        <p id="full-japanese" class="full-japanese"></p>
        <div class="actions">
          <button id="replay" class="replay" type="button">
            <span class="replay-icon">🔊</span>
            <span id="full-korean" class="full-korean"></span>
          </button>
          <button id="next-scene" class="next-scene" type="button">つぎへ ▶</button>
        </div>
      </div>
    </section>
  </main>

  <div class="version-badge">v1.2.0</div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
